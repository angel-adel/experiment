<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Эмулятор кассы Эвотор — тренировка техподдержки</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #1a1e2b 0%, #0f1219 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            padding: 20px;
            margin: 0;
        }

        /* Корпус Эвотор 7.2 */
        .evotor {
            max-width: 650px;
            width: 100%;
            background: #2c2f3a;
            border-radius: 48px;
            padding: 20px 18px 25px 18px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            border-bottom: 3px solid #1e1f26;
        }

        /* Экран */
        .display {
            background: #eef2f5;
            border-radius: 32px;
            padding: 16px;
            box-shadow: inset 0 0 0 2px #cbd5e1, 0 8px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .status-bar {
            background: #1e293b;
            color: #b9ffd6;
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
            font-family: monospace;
        }

        .cart {
            background: white;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 16px;
            min-height: 140px;
            box-shadow: inset 0 0 0 1px #e2e8f0;
        }

        .cart h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: #0f172a;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .cart-items {
            font-size: 13px;
            border-top: 1px solid #e2e8f0;
            padding-top: 8px;
            max-height: 100px;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px dashed #cbd5e1;
        }

        .cart-total {
            font-weight: bold;
            font-size: 18px;
            text-align: right;
            margin-top: 8px;
            color: #0f3b2c;
        }

        /* Клавиатура */
        .keypad {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background: #2d3e50;
            border: none;
            color: white;
            padding: 14px 0;
            border-radius: 60px;
            font-weight: bold;
            font-size: 15px;
            transition: 0.1s linear;
            cursor: pointer;
            box-shadow: 0 3px 0 #0f1720;
            font-family: inherit;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0f1720;
        }

        .btn-danger {
            background: #9b2c2c;
        }

        .btn-warning {
            background: #b45309;
        }

        .btn-success {
            background: #1f6d49;
        }

        .btn-accent {
            background: #2266a8;
        }

        /* Виртуальная чекопечать */
        .receipt {
            background: #fef9e3;
            border-radius: 20px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #2c2c2c;
            margin-top: 16px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid #d4c9a6;
        }

        .error-log {
            background: #1a1c26;
            border-radius: 20px;
            padding: 10px;
            margin-top: 16px;
            font-size: 11px;
            color: #ffb347;
            font-family: monospace;
            max-height: 120px;
            overflow-y: auto;
        }

        .flex-row {
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }

        hr {
            margin: 12px 0;
            border-color: #3a3f4e;
        }

        .badge {
            background: #00000066;
            padding: 2px 8px;
            border-radius: 40px;
            font-size: 10px;
        }
    </style>
</head>
<body>
<div class="evotor">
    <div class="display">
        <div class="status-bar">
            <span>📟 СМЕНА: <strong id="shiftStatus">ЗАКРЫТА</strong></span>
            <span>🧾 ФД №<span id="fdCounter">0</span></span>
            <span>⏱️ <span id="shiftTimer">0ч</span>/24ч</span>
            <span>📡 <span id="onlineStatus">ОНЛАЙН</span></span>
        </div>

        <div class="cart">
            <h3>🛒 ТЕКУЩИЙ ЧЕК
                <button id="clearCartBtn" style="background:#8b5e3c; padding: 4px 10px; font-size: 11px;">Очистить</button>
            </h3>
            <div id="cartList" class="cart-items">(корзина пуста)</div>
            <div class="cart-total">💰 ИТОГО: <span id="cartTotal">0</span> ₽</div>
        </div>

        <div class="keypad">
            <button class="btn-accent" data-product='{"name":"☕ Кофе","price":180}'>☕ Кофе 180₽</button>
            <button class="btn-accent" data-product='{"name":"🥐 Круассан","price":120}'>🥐 Круассан 120₽</button>
            <button class="btn-accent" data-product='{"name":"💧 Вода","price":80}'>💧 Вода 80₽</button>
            <button class="btn-accent" data-product='{"name":"🍔 Бургер","price":320}'>🍔 Бургер 320₽</button>
            <button class="btn-success" id="cashBtn">💵 НАЛИЧНЫЕ</button>
            <button class="btn-success" id="cardBtn">💳 КАРТА (эквайринг)</button>
            <button class="btn-warning" id="openShiftBtn">🔓 ОТКРЫТЬ СМЕНУ</button>
            <button class="btn-danger" id="closeShiftBtn">🔒 Z-ОТЧЕТ (закрыть)</button>
        </div>

        <div class="flex-row">
            <button id="simulateInternetLoss" style="background:#5e2a6e;">🌐 Сбой интернета</button>
            <button id="simulateTimeDrift" style="background:#6b4c1c;">⏰ Сдвиг времени (+7мин)</button>
            <button id="simulateFNexpire" style="background:#8b3c3c;">💀 Истечение ФН</button>
            <button id="simulatePrinterJam" style="background:#7a4a2a;">📄 Зажевало бумагу</button>
        </div>

        <div class="receipt" id="receiptArea">
            [ ЧЕКОПЕЧАТЬ ]<br>➖ Готов принимать команды
        </div>
        <div class="error-log" id="errorLog">
            ✅ Симулятор Эвотор 7.2 запущен (техподдержка)
        </div>
    </div>
</div>

<script>
    // ======================== ЭМУЛЯТОР ВНУТРЕННОСТЕЙ ========================
    let session = {
        shiftOpen: false,
        openTime: null,
        fdCounter: 0,
        totalShiftSum: 0,
        fnValid: true,
        internet: true,
        timeOffsetMs: 0,
        printerJam: false
    };

    let currentCart = [];

    // DOM элементы
    const shiftStatusSpan = document.getElementById('shiftStatus');
    const fdCounterSpan = document.getElementById('fdCounter');
    const shiftTimerSpan = document.getElementById('shiftTimer');
    const onlineStatusSpan = document.getElementById('onlineStatus');
    const cartListDiv = document.getElementById('cartList');
    const cartTotalSpan = document.getElementById('cartTotal');
    const receiptArea = document.getElementById('receiptArea');
    const errorLogDiv = document.getElementById('errorLog');

    function addLog(msg, isError = false) {
        const logEntry = document.createElement('div');
        logEntry.innerHTML = `🕒 ${new Date().toLocaleTimeString()} → ${msg}`;
        logEntry.style.color = isError ? '#ffb347' : '#b9f5d8';
        logEntry.style.borderBottom = '1px solid #2f3542';
        logEntry.style.padding = '2px 0';
        errorLogDiv.appendChild(logEntry);
        errorLogDiv.scrollTop = errorLogDiv.scrollHeight;
        if (errorLogDiv.children.length > 18) errorLogDiv.removeChild(errorLogDiv.children[0]);
    }

    function updateUI() {
        shiftStatusSpan.innerText = session.shiftOpen ? "ОТКРЫТА" : "ЗАКРЫТА";
        fdCounterSpan.innerText = session.fdCounter;
        onlineStatusSpan.innerText = session.internet ? "🟢 ОНЛАЙН" : "🔴 ОФЛАЙН (чеки в буфере)";
        
        if (session.shiftOpen && session.openTime) {
            let effectiveNow = Date.now() + session.timeOffsetMs;
            let diffMs = effectiveNow - session.openTime;
            let hours = Math.floor(diffMs / 3600000);
            let mins = Math.floor((diffMs % 3600000) / 60000);
            shiftTimerSpan.innerText = `${hours}ч ${mins}м`;
            if (hours >= 24) shiftTimerSpan.style.color = "#ffaa66";
            else shiftTimerSpan.style.color = "#b9ffd6";
        } else {
            shiftTimerSpan.innerText = "0ч";
            shiftTimerSpan.style.color = "#b9ffd6";
        }

        if (currentCart.length === 0) {
            cartListDiv.innerHTML = '(пусто)';
            cartTotalSpan.innerText = '0';
        } else {
            cartListDiv.innerHTML = currentCart.map((item, idx) => `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <span>${item.price} ₽ <button class="removeItemBtn" data-idx="${idx}" style="background:#6d3b1f; padding:0px 8px; margin-left:6px; border-radius:30px;">✖</button></span>
                </div>
            `).join('');
            const total = currentCart.reduce((sum, i) => sum + i.price, 0);
            cartTotalSpan.innerText = total;
            document.querySelectorAll('.removeItemBtn').forEach(btn => {
                btn.removeEventListener('click', handleRemove);
                btn.addEventListener('click', handleRemove);
            });
        }
    }

    function handleRemove(e) {
        const idx = e.currentTarget.getAttribute('data-idx');
        if (idx !== null && currentCart[parseInt(idx)]) {
            currentCart.splice(parseInt(idx), 1);
            updateUI();
            addLog(`🗑
