name: Build Scriptonizer APK

on:
  push:
    paths:
      - 'scriptonizer_app/**'
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer
        run: |
          pip install buildozer
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Build APK
        run: |
          cd scriptonizer_app
          buildozer init
          sed -i 's/title = My Application/title = Scriptonizer/' buildozer.spec
          sed -i 's/package.name = myapp/package.name = scriptonizer/' buildozer.spec
          sed -i 's/package.domain = org.example/package.domain = com.angeladel/' buildozer.spec
          sed -i 's/# requirements = python3,kivy/requirements = python3,kivy/' buildozer.spec
          sed -i 's/# orientation = landscape/orientation = portrait/' buildozer.spec
          sed -i 's/# fullscreen = 0/fullscreen = 0/' buildozer.spec
          echo "android.permissions = INTERNET" >> buildozer.spec
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: scriptonizer-apk
          path: scriptonizer_app/bin/*.apk
